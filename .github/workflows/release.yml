# Build, sign (Azure Trusted Signing), and publish a Project Pinner release.
#
# Produces ONE artifact: a single signed ProjectPinner.exe that installs everything.
# Double-click it (no admin) -> it drops the native shell-ext DLL + registers the signed
# sparse MSIX, giving the Windows 11 TOP-LEVEL right-click menu, then opens the app.
#
# Build order matters: the exe EMBEDS the already-signed DLL + MSIX, so we
#   build DLL -> sign DLL -> build MSIX -> sign MSIX -> build exe (embeds them) -> sign exe.
# The MSIX manifest Publisher is hardcoded to the cert subject, so the MSIX can be built
# before the exe exists.
#
# Signing: Azure Trusted Signing via OIDC (secrets AZURE_TENANT_ID + AZURE_CLIENT_ID,
# federated credential for this repo's main ref). If AZURE_TENANT_ID is unset, signing is
# skipped and UNSIGNED artifacts are produced (the MSIX menu will NOT load until signed).
#
# Run with draft=true (default) to stage a hidden release for testing, then publish it.

name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, e.g. 1.0.8 (no leading v)'
        required: true
        type: string
      draft:
        description: 'Create as a hidden DRAFT release (publish manually after testing)'
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  id-token: write

jobs:
  build-sign-release:
    runs-on: windows-latest
    timeout-minutes: 35
    env:
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      TRUSTED_SIGNING_ENDPOINT: ${{ vars.TRUSTED_SIGNING_ENDPOINT || 'https://eus.codesigning.azure.net/' }}
      TRUSTED_SIGNING_ACCOUNT: ${{ vars.TRUSTED_SIGNING_ACCOUNT || 'WDS-Signing' }}
      TRUSTED_SIGNING_CERT_PROFILE: ${{ vars.TRUSTED_SIGNING_CERT_PROFILE || 'WaldoDevelopment-PublicTrust' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require signing secret
        shell: pwsh
        run: |
          if ([string]::IsNullOrEmpty($env:AZURE_TENANT_ID)) {
            throw "AZURE_TENANT_ID is not set. Signing is required (an unsigned sparse MSIX will not register and the menu won't load). Aborting."
          }

      - name: Setup .NET 8 (builds the net48 target)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup MSBuild (for the C++ shell-ext DLL)
        uses: microsoft/setup-msbuild@v2

      - name: Build native shell-ext DLL (x64, Release)
        shell: pwsh
        run: |
          msbuild src/ProjectPinner.ShellExt/ProjectPinner.ShellExt.vcxproj `
            /p:Configuration=Release /p:Platform=x64 /m /nologo
          if (-not (Test-Path 'src/ProjectPinner.ShellExt/bin/Release/ProjectPinner.ShellExt.dll')) {
            throw 'Shell-ext DLL build produced no output.'
          }
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item src/ProjectPinner.ShellExt/bin/Release/ProjectPinner.ShellExt.dll dist/ProjectPinner.ShellExt.dll -Force
          Copy-Item assets/app.ico dist/app.ico -Force

      - name: Azure login (OIDC federated)
        if: env.AZURE_TENANT_ID != ''
        uses: azure/login@v2
        with:
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          client-id: ${{ env.AZURE_CLIENT_ID }}
          subscription-id: 460c420e-f1e8-4ef3-93af-a7afbeb56c11

      - name: Ensure PSGallery is registered
        if: env.AZURE_TENANT_ID != ''
        shell: pwsh
        run: |
          if (-not (Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue)) {
            Register-PSRepository -Default -ErrorAction SilentlyContinue
          }
          if (-not (Get-PackageSource -Name PSGallery -ErrorAction SilentlyContinue)) {
            Register-PackageSource -Name PSGallery -ProviderName PowerShellGet `
              -Location https://www.powershellgallery.com/api/v2 -Trusted -Force -ErrorAction SilentlyContinue
          }
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted -ErrorAction SilentlyContinue

      - name: Sign shell-ext DLL (Azure Trusted Signing)
        if: env.AZURE_TENANT_ID != ''
        uses: azure/trusted-signing-action@v0
        with:
          azure-tenant-id: ${{ env.AZURE_TENANT_ID }}
          azure-client-id: ${{ env.AZURE_CLIENT_ID }}
          endpoint: ${{ env.TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ env.TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ env.TRUSTED_SIGNING_CERT_PROFILE }}
          files-folder: ${{ github.workspace }}/dist
          files-folder-filter: dll
          files-folder-recurse: false
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Build sparse MSIX (external content)
        shell: pwsh
        run: |
          $v = '${{ github.event.inputs.version }}'.TrimStart('v')
          & packaging/build-msix.ps1 -OutDir dist -Version $v

      - name: Sign MSIX (Azure Trusted Signing)
        if: env.AZURE_TENANT_ID != ''
        uses: azure/trusted-signing-action@v0
        with:
          azure-tenant-id: ${{ env.AZURE_TENANT_ID }}
          azure-client-id: ${{ env.AZURE_CLIENT_ID }}
          endpoint: ${{ env.TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ env.TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ env.TRUSTED_SIGNING_CERT_PROFILE }}
          files-folder: ${{ github.workspace }}/dist
          files-folder-filter: msix
          files-folder-recurse: false
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      # The exe embeds the now-signed dist/ProjectPinner.ShellExt.dll + dist/ProjectPinner.msix.
      - name: Build app exe (net48, Release, embeds signed DLL + MSIX)
        shell: pwsh
        run: |
          dotnet build src/ProjectPinner/ProjectPinner.csproj -c Release -nologo
          Copy-Item src/ProjectPinner/bin/Release/ProjectPinner.exe dist/ProjectPinner.exe -Force

      - name: Sign exe (Azure Trusted Signing)
        if: env.AZURE_TENANT_ID != ''
        uses: azure/trusted-signing-action@v0
        with:
          azure-tenant-id: ${{ env.AZURE_TENANT_ID }}
          azure-client-id: ${{ env.AZURE_CLIENT_ID }}
          endpoint: ${{ env.TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ env.TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ env.TRUSTED_SIGNING_CERT_PROFILE }}
          files-folder: ${{ github.workspace }}/dist
          files-folder-filter: exe
          files-folder-recurse: false
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Show signatures + build notes
        shell: pwsh
        run: |
          foreach ($f in 'ProjectPinner.exe','ProjectPinner.ShellExt.dll','ProjectPinner.msix') {
            $sig = Get-AuthenticodeSignature "dist/$f"
            Write-Host "$f  -> $($sig.Status)  $($sig.SignerCertificate.Subject)"
          }
          $exeSha = (Get-FileHash dist/ProjectPinner.exe -Algorithm SHA256).Hash
          @"
          Project Pinner — friendly Quick Access names for long network project numbers.

          ## Install (no admin)
          1. Download **ProjectPinner.exe** below.
          2. Double-click it.

          That's it. It installs the Windows 11 top-level right-click menu and opens the app.
          Right-click any folder -> **Pin with alias to Quick Access**.

          To update: download the new exe and run it. To uninstall: open Project Pinner ->
          **Uninstall** (or Settings -> Apps -> Project Pinner).

          Signed by Azure Trusted Signing (Waldo Development LLC) — no SmartScreen warning.
          Your network folders are never moved, renamed, or modified — aliases are shortcuts.

          SHA-256 (ProjectPinner.exe): ``$exeSha``

          © 2026 Waldo Development LLC. All rights reserved.
          "@ | Out-File -FilePath dist/notes.md -Encoding utf8

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $v = '${{ github.event.inputs.version }}'.TrimStart('v')
          $relArgs = @("v$v", "dist/ProjectPinner.exe",
                       "--title", "Project Pinner v$v", "--notes-file", "dist/notes.md")
          if ('${{ github.event.inputs.draft }}' -ne 'false') { $relArgs += '--draft' }
          gh release create @relArgs
