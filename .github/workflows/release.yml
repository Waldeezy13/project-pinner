# Build, sign (Azure Trusted Signing), and publish a Project Pinner release.
#
# Produces TWO artifacts:
#   ProjectPinner.exe  — plain exe (self-installs, right-click under "Show more options")
#   ProjectPinner.msix — MSIX package (installs per-user, right-click in TOP-LEVEL Win 11 menu)
#
# Run: Actions -> release -> "Run workflow", branch main, version e.g. 1.0.4
#
# Required secrets:  AZURE_TENANT_ID, AZURE_CLIENT_ID
# Optional vars:     TRUSTED_SIGNING_ENDPOINT / ACCOUNT / CERT_PROFILE (defaults match WDS)

name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, e.g. 1.0.4 (no leading v)'
        required: true
        type: string

permissions:
  contents: write   # create GitHub Release
  id-token: write   # OIDC federated auth to Azure Trusted Signing

jobs:
  build-sign-release:
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      TRUSTED_SIGNING_ENDPOINT: ${{ vars.TRUSTED_SIGNING_ENDPOINT || 'https://eus.codesigning.azure.net/' }}
      TRUSTED_SIGNING_ACCOUNT: ${{ vars.TRUSTED_SIGNING_ACCOUNT || 'WDS-Signing' }}
      TRUSTED_SIGNING_CERT_PROFILE: ${{ vars.TRUSTED_SIGNING_CERT_PROFILE || 'WaldoDevelopment-PublicTrust' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8 (builds the net48 target)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build (net48, Release)
        shell: pwsh
        run: dotnet build src/ProjectPinner/ProjectPinner.csproj -c Release -nologo

      - name: Azure login (OIDC federated)
        if: env.AZURE_TENANT_ID != ''
        uses: azure/login@v2
        with:
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          client-id: ${{ env.AZURE_CLIENT_ID }}
          subscription-id: 460c420e-f1e8-4ef3-93af-a7afbeb56c11

      - name: Ensure PSGallery is registered
        if: env.AZURE_TENANT_ID != ''
        shell: pwsh
        run: |
          if (-not (Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue)) {
            Register-PSRepository -Default -ErrorAction SilentlyContinue
          }
          if (-not (Get-PackageSource -Name PSGallery -ErrorAction SilentlyContinue)) {
            Register-PackageSource -Name PSGallery -ProviderName PowerShellGet `
              -Location https://www.powershellgallery.com/api/v2 -Trusted -Force -ErrorAction SilentlyContinue
          }
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted -ErrorAction SilentlyContinue

      # ---- Sign the exe first (Publisher extracted from this cert for the MSIX manifest) ----
      - name: Sign ProjectPinner.exe (Azure Trusted Signing)
        if: env.AZURE_TENANT_ID != ''
        uses: azure/trusted-signing-action@v0
        with:
          azure-tenant-id: ${{ env.AZURE_TENANT_ID }}
          azure-client-id: ${{ env.AZURE_CLIENT_ID }}
          endpoint: ${{ env.TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ env.TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ env.TRUSTED_SIGNING_CERT_PROFILE }}
          files-folder: ${{ github.workspace }}/src/ProjectPinner/bin/Release
          files-folder-filter: exe
          files-folder-recurse: false
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Stage exe artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item src/ProjectPinner/bin/Release/ProjectPinner.exe dist/ProjectPinner.exe -Force
          $sig = Get-AuthenticodeSignature dist/ProjectPinner.exe
          Write-Host "Exe signature: $($sig.Status)  —  $($sig.SignerCertificate.Subject)"

      # ---- Build the MSIX (Publisher injected from the signed exe's cert) ----
      - name: Build MSIX package
        shell: pwsh
        run: |
          $v = '${{ github.event.inputs.version }}'.TrimStart('v') + '.0'
          & packaging/build-msix.ps1 `
            -ExePath dist/ProjectPinner.exe `
            -OutDir  dist `
            -Version $v

      # ---- Sign the MSIX with the same cert -----------------------------------
      - name: Sign ProjectPinner.msix (Azure Trusted Signing)
        if: env.AZURE_TENANT_ID != ''
        uses: azure/trusted-signing-action@v0
        with:
          azure-tenant-id: ${{ env.AZURE_TENANT_ID }}
          azure-client-id: ${{ env.AZURE_CLIENT_ID }}
          endpoint: ${{ env.TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ env.TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ env.TRUSTED_SIGNING_CERT_PROFILE }}
          files-folder: ${{ github.workspace }}/dist
          files-folder-filter: msix
          files-folder-recurse: false
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Show artifact info + build release notes
        shell: pwsh
        run: |
          $exeSig  = Get-AuthenticodeSignature dist/ProjectPinner.exe
          $msixSig = Get-AuthenticodeSignature dist/ProjectPinner.msix
          $exeSha  = (Get-FileHash dist/ProjectPinner.exe  -Algorithm SHA256).Hash
          $msixSha = (Get-FileHash dist/ProjectPinner.msix -Algorithm SHA256).Hash
          Write-Host "EXE  sig: $($exeSig.Status)   signer: $($exeSig.SignerCertificate.Subject)"
          Write-Host "MSIX sig: $($msixSig.Status)  signer: $($msixSig.SignerCertificate.Subject)"
          Write-Host "EXE  SHA-256: $exeSha"
          Write-Host "MSIX SHA-256: $msixSha"
          @"
          Signed build of Project Pinner — friendly Quick Access names for long network project numbers.

          ## Install options

          | File | How to install | Right-click menu position |
          |---|---|---|
          | **ProjectPinner.msix** | Double-click → Windows install dialog, no admin | Top-level Windows 11 menu |
          | **ProjectPinner.exe**  | Run directly, self-installs to LocalAppData, no admin | Under "Show more options" (Win 11) |

          Both are signed by Azure Trusted Signing (Waldo Development LLC) — no SmartScreen warning.

          Right-click a folder → **Pin with alias to Quick Access**. Aliases are ordinary shortcuts; your network folders are never moved, renamed, or modified.

          ## SHA-256 checksums
          ```
          ProjectPinner.exe   $exeSha
          ProjectPinner.msix  $msixSha
          ```

          © 2026 Waldo Development LLC. All rights reserved.
          "@ | Out-File -FilePath dist/notes.md -Encoding utf8

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $v = '${{ github.event.inputs.version }}'.TrimStart('v')
          gh release create "v$v" dist/ProjectPinner.exe dist/ProjectPinner.msix `
            --title "Project Pinner v$v" `
            --notes-file dist/notes.md
