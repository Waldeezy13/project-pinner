# Build, sign (Azure Trusted Signing), and publish a Project Pinner release.
#
# Produces:
#   ProjectPinner-Setup.zip  — native shell-ext DLL + sparse MSIX + exe + installer.
#                              Right-click verb in the Win11 TOP-LEVEL menu.
#   ProjectPinner.exe        — standalone signed exe (verb under "Show more options").
#
# Signing uses Azure Trusted Signing via OIDC (secrets AZURE_TENANT_ID +
# AZURE_CLIENT_ID, federated credential subject repo:Waldeezy13/project-pinner:
# ref:refs/heads/main). If AZURE_TENANT_ID is unset, signing is skipped and
# UNSIGNED artifacts are produced (the MSIX context menu will NOT load).
#
# Run with draft=true (default) to stage a hidden release for testing, then
# publish it manually once verified.

name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, e.g. 1.0.5 (no leading v)'
        required: true
        type: string
      draft:
        description: 'Create as a hidden DRAFT release (publish manually after testing)'
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  id-token: write

jobs:
  build-sign-release:
    runs-on: windows-latest
    timeout-minutes: 35
    env:
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      TRUSTED_SIGNING_ENDPOINT: ${{ vars.TRUSTED_SIGNING_ENDPOINT || 'https://eus.codesigning.azure.net/' }}
      TRUSTED_SIGNING_ACCOUNT: ${{ vars.TRUSTED_SIGNING_ACCOUNT || 'WDS-Signing' }}
      TRUSTED_SIGNING_CERT_PROFILE: ${{ vars.TRUSTED_SIGNING_CERT_PROFILE || 'WaldoDevelopment-PublicTrust' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8 (builds the net48 target)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup MSBuild (for the C++ shell-ext DLL)
        uses: microsoft/setup-msbuild@v2

      - name: Build native shell-ext DLL (x64, Release)
        shell: pwsh
        run: |
          msbuild src/ProjectPinner.ShellExt/ProjectPinner.ShellExt.vcxproj `
            /p:Configuration=Release /p:Platform=x64 /m /nologo
          if (-not (Test-Path 'src/ProjectPinner.ShellExt/bin/Release/ProjectPinner.ShellExt.dll')) {
            throw 'Shell-ext DLL build produced no output.'
          }

      - name: Build app exe (net48, Release)
        shell: pwsh
        run: dotnet build src/ProjectPinner/ProjectPinner.csproj -c Release -nologo

      - name: Stage binaries
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item src/ProjectPinner/bin/Release/ProjectPinner.exe dist/ProjectPinner.exe -Force
          Copy-Item src/ProjectPinner.ShellExt/bin/Release/ProjectPinner.ShellExt.dll dist/ProjectPinner.ShellExt.dll -Force
          Copy-Item assets/app.ico dist/app.ico -Force

      - name: Azure login (OIDC federated)
        if: env.AZURE_TENANT_ID != ''
        uses: azure/login@v2
        with:
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          client-id: ${{ env.AZURE_CLIENT_ID }}
          subscription-id: 460c420e-f1e8-4ef3-93af-a7afbeb56c11

      - name: Ensure PSGallery is registered
        if: env.AZURE_TENANT_ID != ''
        shell: pwsh
        run: |
          if (-not (Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue)) {
            Register-PSRepository -Default -ErrorAction SilentlyContinue
          }
          if (-not (Get-PackageSource -Name PSGallery -ErrorAction SilentlyContinue)) {
            Register-PackageSource -Name PSGallery -ProviderName PowerShellGet `
              -Location https://www.powershellgallery.com/api/v2 -Trusted -Force -ErrorAction SilentlyContinue
          }
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted -ErrorAction SilentlyContinue

      - name: Sign exe (Azure Trusted Signing)
        if: env.AZURE_TENANT_ID != ''
        uses: azure/trusted-signing-action@v0
        with:
          azure-tenant-id: ${{ env.AZURE_TENANT_ID }}
          azure-client-id: ${{ env.AZURE_CLIENT_ID }}
          endpoint: ${{ env.TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ env.TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ env.TRUSTED_SIGNING_CERT_PROFILE }}
          files-folder: ${{ github.workspace }}/dist
          files-folder-filter: exe
          files-folder-recurse: false
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Sign shell-ext DLL (Azure Trusted Signing)
        if: env.AZURE_TENANT_ID != ''
        uses: azure/trusted-signing-action@v0
        with:
          azure-tenant-id: ${{ env.AZURE_TENANT_ID }}
          azure-client-id: ${{ env.AZURE_CLIENT_ID }}
          endpoint: ${{ env.TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ env.TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ env.TRUSTED_SIGNING_CERT_PROFILE }}
          files-folder: ${{ github.workspace }}/dist
          files-folder-filter: dll
          files-folder-recurse: false
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Build sparse MSIX (Publisher injected from signed exe)
        shell: pwsh
        run: |
          $v = '${{ github.event.inputs.version }}'.TrimStart('v') + '.0'
          & packaging/build-msix.ps1 -ExePath dist/ProjectPinner.exe -OutDir dist -Version $v

      - name: Sign MSIX (Azure Trusted Signing)
        if: env.AZURE_TENANT_ID != ''
        uses: azure/trusted-signing-action@v0
        with:
          azure-tenant-id: ${{ env.AZURE_TENANT_ID }}
          azure-client-id: ${{ env.AZURE_CLIENT_ID }}
          endpoint: ${{ env.TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ env.TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ env.TRUSTED_SIGNING_CERT_PROFILE }}
          files-folder: ${{ github.workspace }}/dist
          files-folder-filter: msix
          files-folder-recurse: false
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Assemble setup bundle + notes
        shell: pwsh
        run: |
          $stage = 'dist/setup'
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item dist/ProjectPinner.exe            "$stage/ProjectPinner.exe" -Force
          Copy-Item dist/ProjectPinner.ShellExt.dll   "$stage/ProjectPinner.ShellExt.dll" -Force
          Copy-Item dist/ProjectPinner.msix           "$stage/ProjectPinner.msix" -Force
          Copy-Item dist/app.ico                      "$stage/app.ico" -Force
          Copy-Item packaging/Install.ps1   "$stage/Install.ps1" -Force
          Copy-Item packaging/Install.bat   "$stage/Install.bat" -Force
          Copy-Item packaging/Uninstall.ps1 "$stage/Uninstall.ps1" -Force
          Copy-Item packaging/Uninstall.bat "$stage/Uninstall.bat" -Force
          Copy-Item packaging/README.txt    "$stage/README.txt" -Force
          Compress-Archive -Path "$stage/*" -DestinationPath dist/ProjectPinner-Setup.zip -Force

          foreach ($f in 'ProjectPinner.exe','ProjectPinner.ShellExt.dll','ProjectPinner.msix') {
            $sig = Get-AuthenticodeSignature "dist/$f"
            Write-Host "$f  -> $($sig.Status)  $($sig.SignerCertificate.Subject)"
          }
          $zipSha = (Get-FileHash dist/ProjectPinner-Setup.zip -Algorithm SHA256).Hash
          $exeSha = (Get-FileHash dist/ProjectPinner.exe -Algorithm SHA256).Hash
          @"
          Project Pinner — friendly Quick Access names for long network project numbers.

          ## Two ways to install

          | Download | Menu position | How |
          |---|---|---|
          | **ProjectPinner-Setup.zip** | Win11 **top-level** right-click menu | Unzip, double-click Install.bat (no admin) |
          | **ProjectPinner.exe** | Under "Show more options" | Run it directly (no admin) |

          The Setup zip installs a signed sparse MSIX + a native shell extension so the
          "Pin with alias to Quick Access" verb appears in the main Windows 11 menu.

          Both are signed by Azure Trusted Signing (Waldo Development LLC) — no SmartScreen warning.
          Your network folders are never moved, renamed, or modified — aliases are ordinary shortcuts.

          ## SHA-256
          ```
          ProjectPinner-Setup.zip  $zipSha
          ProjectPinner.exe        $exeSha
          ```

          © 2026 Waldo Development LLC. All rights reserved.
          "@ | Out-File -FilePath dist/notes.md -Encoding utf8

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $v = '${{ github.event.inputs.version }}'.TrimStart('v')
          $relArgs = @("v$v", "dist/ProjectPinner-Setup.zip", "dist/ProjectPinner.exe",
                       "--title", "Project Pinner v$v", "--notes-file", "dist/notes.md")
          if ('${{ github.event.inputs.draft }}' -ne 'false') { $relArgs += '--draft' }
          gh release create @relArgs
